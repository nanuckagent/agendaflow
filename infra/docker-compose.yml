version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# AgendaFlow — Local Development Stack
# ────────────────────────────────────────────────────────────────────────────
# Services: PostgreSQL 16, Redis 7, Backend (Hono), Worker (BullMQ), Frontend (Vite)
# Networks: internal (db/redis/backend/worker), proxy (traefik, backend, frontend)
# Usage: docker compose up -d

networks:
  internal:
    name: agendaflow-internal
    driver: bridge

volumes:
  postgres_data:
    name: agendaflow_postgres_data
  redis_data:
    name: agendaflow_redis_data

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 Database
  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agendaflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agendaflow}
      POSTGRES_USER: ${POSTGRES_USER:-agendaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agendaflow} -d ${POSTGRES_DB:-agendaflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Redis 7 Cache & Job Queue
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agendaflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Backend API Server (Hono + Node 20)
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
      cache_from:
        - type=registry,ref=ghcr.io/nanuckagent/agendaflow-backend:latest
    image: agendaflow-backend:dev
    container_name: agendaflow-backend
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      APP_ROLE: api
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-agendaflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agendaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # Background Job Worker (BullMQ + Node 20)
  # ────────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/docker/worker.Dockerfile
      cache_from:
        - type=registry,ref=ghcr.io/nanuckagent/agendaflow-backend:latest
    image: agendaflow-backend:dev
    container_name: agendaflow-worker
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      APP_ROLE: worker
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-agendaflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agendaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend SPA (React + Vite + Nginx)
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_APP_ENV: development
        VITE_APP_VERSION: 0.1.0-dev
      cache_from:
        - type=registry,ref=ghcr.io/nanuckagent/agendaflow-frontend:latest
    image: agendaflow-frontend:dev
    container_name: agendaflow-frontend
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
