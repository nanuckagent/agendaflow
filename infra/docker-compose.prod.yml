version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# AgendaFlow — Production Stack (Traefik-integrated)
# ────────────────────────────────────────────────────────────────────────────
# Requirements:
#   - Traefik running on network 'proxy' with Cloudflare DNS resolver
#   - .env.production with DATABASE_URL, REDIS_PASSWORD, JWT_SECRET, etc.
#   - Domain: agendaflow.nanuck.com.br (or configured via DOMAIN env var)
#
# Usage: docker compose -f infra/docker-compose.prod.yml up -d
# Deploy: git pull && docker compose pull && docker compose up -d

networks:
  internal:
    name: agendaflow-internal
    driver: bridge
  proxy:
    external: true
    name: proxy

volumes:
  postgres_data:
    name: agendaflow_postgres_data
  redis_data:
    name: agendaflow_redis_data

services:
  # ────────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16 Database (production configuration)
  # ────────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: agendaflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agendaflow}
      POSTGRES_USER: ${POSTGRES_USER:-agendaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      # Tuning for better performance
      POSTGRES_INITDB_ARGS: "-c shared_buffers=256MB -c effective_cache_size=1GB -c work_mem=16MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agendaflow} -d ${POSTGRES_DB:-agendaflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Redis 7 Cache & Job Queue (512MB limit for production)
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agendaflow-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ────────────────────────────────────────────────────────────────────────────
  # Backend API Server (Hono + Node 20)
  # Exposed to Traefik proxy network for HTTPS routing
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    image: ghcr.io/nanuckagent/agendaflow-backend:${APP_VERSION:-latest}
    container_name: agendaflow-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ROLE: api
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agendaflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agendaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # ────────────────────────────────────────────────────────────────────────────
      # Router: Health & Readiness (public, no auth)
      # ────────────────────────────────────────────────────────────────────────────
      - traefik.http.routers.agf-health.entrypoints=https
      - traefik.http.routers.agf-health.rule=Host(`${DOMAIN:-agendaflow.nanuck.com.br}`) && (PathPrefix(`/healthz`) || PathPrefix(`/readyz`))
      - traefik.http.routers.agf-health.priority=110
      - traefik.http.routers.agf-health.tls=true
      - traefik.http.routers.agf-health.tls.certresolver=cloudflare
      - traefik.http.services.agf-health.loadbalancer.server.port=8000

      # ────────────────────────────────────────────────────────────────────────────
      # Router: Metrics (protected by IP whitelist)
      # ────────────────────────────────────────────────────────────────────────────
      - traefik.http.routers.agf-metrics.entrypoints=https
      - traefik.http.routers.agf-metrics.rule=Host(`${DOMAIN:-agendaflow.nanuck.com.br}`) && PathPrefix(`/metrics`)
      - traefik.http.routers.agf-metrics.priority=105
      - traefik.http.routers.agf-metrics.tls=true
      - traefik.http.routers.agf-metrics.tls.certresolver=cloudflare
      - traefik.http.routers.agf-metrics.middlewares=ip-whitelist-admin@file
      - traefik.http.services.agf-metrics.loadbalancer.server.port=8000

      # ────────────────────────────────────────────────────────────────────────────
      # Router: API v1 (main application routes)
      # ────────────────────────────────────────────────────────────────────────────
      - traefik.http.routers.agf-api.entrypoints=https
      - traefik.http.routers.agf-api.rule=Host(`${DOMAIN:-agendaflow.nanuck.com.br}`) && PathPrefix(`/v1`)
      - traefik.http.routers.agf-api.priority=100
      - traefik.http.routers.agf-api.tls=true
      - traefik.http.routers.agf-api.tls.certresolver=cloudflare
      - traefik.http.services.agf-api.loadbalancer.server.port=8000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ────────────────────────────────────────────────────────────────────────────
  # Background Job Worker (BullMQ + Node 20)
  # Not exposed externally, internal network only
  # ────────────────────────────────────────────────────────────────────────────
  worker:
    image: ghcr.io/nanuckagent/agendaflow-backend:${APP_VERSION:-latest}
    container_name: agendaflow-worker
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ROLE: worker
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-agendaflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-agendaflow}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend SPA (React + Vite + Nginx)
  # Exposed to Traefik proxy network for HTTPS/SPA routing
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/nanuckagent/agendaflow-frontend:${APP_VERSION:-latest}
    container_name: agendaflow-frontend
    restart: unless-stopped
    networks:
      - proxy
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # ────────────────────────────────────────────────────────────────────────────
      # Router: SPA catch-all (lowest priority, serves index.html for all routes)
      # ────────────────────────────────────────────────────────────────────────────
      - traefik.http.routers.agf-web.entrypoints=https
      - traefik.http.routers.agf-web.rule=Host(`${DOMAIN:-agendaflow.nanuck.com.br}`)
      - traefik.http.routers.agf-web.priority=10
      - traefik.http.routers.agf-web.tls=true
      - traefik.http.routers.agf-web.tls.certresolver=cloudflare
      - traefik.http.services.agf-web.loadbalancer.server.port=80

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
