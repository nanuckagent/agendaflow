name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  CACHE_VERSION: v1

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Linting: ESLint across all workspaces
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Run linters
        run: npm run lint --workspaces

  # ────────────────────────────────────────────────────────────────────────────
  # Type checking: TypeScript across all workspaces
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Type check
        run: npm run typecheck --workspaces

  # ────────────────────────────────────────────────────────────────────────────
  # Unit tests: Jest (backend) + Vitest (frontend)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agendaflow_test
          POSTGRES_USER: agendaflow
          POSTGRES_PASSWORD: testpass123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Run tests
        run: npm run test --workspaces
        env:
          DATABASE_URL: postgresql://agendaflow:testpass123@localhost:5432/agendaflow_test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            src/backend/coverage/
            src/frontend/coverage/
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────────────
  # Build: Compile all packages (TypeScript + Vite)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces

      - name: Build all packages
        run: npm run build --workspaces

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            src/backend/dist/
            src/frontend/dist/
          retention-days: 1
